<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot MCP Companion - Documentation</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app" class="app">
        <!-- Navigation Header -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-brand">
                    <a href="#" class="logo">

                        </svg>
                        <span class="logo-text">MCP Companion</span>

                </div>

                <div class="navbar-search">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search docs..." aria-label="Search documentation">
                    <span class="search-hint">⌘K</span>
                </div>

                <div class="navbar-controls">
                    <button id="themeToggle" class="theme-btn" title="Toggle dark mode" aria-label="Toggle theme">
                        <svg class="theme-icon" viewBox="0 0 24 24" fill="currentColor">

                    </button>
                    <a href="https://github.com/RaynerMDZ/spring-boot-mcp-companion" class="github-link" title="GitHub">

                        </svg>
                    </a>
                </div>

                <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-scroll">
                    <nav class="sidebar-nav">
                        <!-- Generated by JavaScript -->
                    </nav>
                </div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Hero Section (only on home) -->
                <div id="heroSection" class="hero-section">
                    <div class="hero-content">
                        <h1 class="hero-title">Spring Boot MCP Companion</h1>
                        <p class="hero-subtitle">Integrate Model Context Protocol into Spring Boot with zero refactoring</p>
                        <div class="hero-cta">
                            <button class="cta-primary" onclick="loadFirstPage()">Get Started</button>
                            <a href="https://github.com/RaynerMDZ/spring-boot-mcp-companion" class="cta-secondary">View on GitHub</a>
                        </div>
                        <div class="hero-features">
                            <div class="feature-badge">⚡ Zero Config</div>
                            <div class="feature-badge">📦 Production Ready</div>
                            <div class="feature-badge">🔒 Type Safe</div>
                        </div>
                    </div>
                </div>

                <!-- Document Content -->
                <div class="doc-container">
                    <div class="doc-header">
                        <div id="breadcrumb" class="breadcrumb"></div>
                        <div class="doc-meta" id="docMeta"></div>
                    </div>

                    <article id="docContent" class="doc-content">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading documentation...</p>
                        </div>
                    </article>

                    <footer class="doc-footer">
                        <div class="doc-nav-buttons">
                            <button id="prevBtn" class="nav-btn nav-prev" style="display: none;">
                                <span class="nav-arrow">←</span>
                                <span class="nav-label">Previous</span>
                            </button>
                            <button id="nextBtn" class="nav-btn nav-next" style="display: none;">
                                <span class="nav-label">Next</span>
                                <span class="nav-arrow">→</span>
                            </button>
                        </div>
                        <div class="doc-edit">
                            <a href="#" id="editLink" class="edit-link" target="_blank">Edit on GitHub</a>
                        </div>
                    </footer>
                </div>
            </main>
        </div>

        <!-- Search Modal -->
        <div id="searchModal" class="search-modal">
            <div class="search-modal-overlay"></div>
            <div class="search-modal-content">
                <div class="search-modal-inner">
                    <div class="search-header">
                        <input type="text" id="searchModalInput" class="search-modal-input" placeholder="Search documentation..." autofocus>
                        <button class="search-close" aria-label="Close search">&times;</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
