spring:
  application:
    name: spring-boot-mcp-companion

server:
  port: 8080  # Main application server port (default: 8080)

# MCP Server Configuration
# NOTE: MCP runs on a SEPARATE embedded server, independent from the main app
mcp:
  server:
    enabled: true               # Enable/disable MCP server (default: true)
    port: 8090                  # MCP server port - separate from server.port (default: 8090)
    base-path: /mcp             # Base path for MCP endpoints (default: /mcp)
    name: spring-boot-mcp       # Server name for MCP server-info
    version: 1.0.0              # Server version for MCP server-info
